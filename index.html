<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السبحة الإلكترونية ومواقيت الصلاة</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts (Cairo & Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkGreen: '#011c15',
                        cardGreen: 'rgba(4, 120, 87, 0.15)',
                        goldAccent: '#fbbf24'
                    },
                    fontFamily: {
                        cairo: ['Cairo', 'sans-serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #011c15;
            -webkit-tap-highlight-color: transparent;
        }
        .tap-active:active {
            transform: scale(0.97);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }
    </style>
</head>
<body class="text-slate-100 antialiased min-h-screen flex justify-center items-start overflow-x-hidden">

    <!-- الحاوية الرئيسية المتجاوبة (كامل الشاشة للموبايل وملمومة للكمبيوتر) -->
    <div class="w-full md:max-w-md min-h-screen bg-darkGreen flex flex-col justify-between mx-auto shadow-2xl border-x border-emerald-950 px-5 py-6">
        
        <!-- القسم العلوي: الهيدر ومواقيت الصلاة -->
        <div class="space-y-5 flex-1">
            
            <!-- الهيدر -->
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="bg-amber-400/10 text-goldAccent border border-amber-400/20 text-[11px] font-bold px-2 py-0.5 rounded-md">السبحة المحدثة</span>
                    <h1 class="text-sm font-bold text-slate-300">الذكر الحكيم</h1>
                </div>
                <div class="text-xs text-emerald-400/80 font-sans" id="live-clock">00:00:00</div>
            </div>

            <!-- كرت الصلاة القادمة الدقيق -->
            <div class="bg-gradient-to-br from-emerald-950 to-transparent border border-emerald-900/40 rounded-2xl p-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-amber-400/10 flex items-center justify-center text-goldAccent border border-amber-400/20">
                        <i class="fa-solid fa-clock text-lg" id="prayer-icon"></i>
                    </div>
                    <div>
                        <span class="text-[10px] font-bold text-amber-400 block tracking-wider uppercase">الأذان القادم</span>
                        <span id="prayer-name" class="text-sm font-black text-white">جاري الحساب..</span>
                    </div>
                </div>
                <div class="text-left" dir="ltr">
                    <span id="prayer-time" class="text-lg font-black text-white font-sans">00:00</span>
                    <span id="prayer-countdown" class="text-[10px] text-emerald-400/70 block mt-0.5">متبقي --:--</span>
                </div>
            </div>

            <!-- كرت الدعاء العشوائي المتغير -->
            <div class="bg-cardGreen border border-emerald-900/30 rounded-2xl p-4 relative overflow-hidden space-y-2">
                <div class="flex justify-between items-center border-b border-emerald-900/30 pb-2">
                    <span class="text-xs font-bold text-goldAccent"><i class="fa-solid fa-heart-pulse ml-1"></i> دعاء مستحب</span>
                    <button onclick="changeRandomDua()" class="text-emerald-400 hover:text-amber-400 transition-colors text-xs flex items-center gap-1 active:scale-90">
                        <i class="fa-solid fa-arrows-rotate"></i> تدوير
                    </button>
                </div>
                <p id="random-dua-text" class="text-sm font-medium text-slate-200 leading-relaxed min-h-[48px] flex items-center">
                    جاري تحميل الأدعية...
                </p>
            </div>

            <!-- قائمة أذكار السبحة المتاحة -->
            <div class="space-y-2">
                <span class="text-xs font-bold text-emerald-400/70 block px-1">اختر ذكر العداد:</span>
                <div class="grid grid-cols-2 gap-2" id="dhikr-grid">
                    <!-- سيتم ملؤه عبر الـ JavaScript -->
                </div>
            </div>

        </div>

        <!-- القسم السفلي: لوحة التحكم وزر التسبيح الكبير -->
        <div class="space-y-4 pt-6 bg-darkGreen sticky bottom-0 z-10">
            
            <!-- أزرار التحكم الصغيرة -->
            <div class="flex gap-2">
                <button onclick="resetCounter()" class="flex-1 bg-emerald-950/50 hover:bg-emerald-900/40 border border-emerald-900/50 text-emerald-400 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                    <span>تصفير العداد الحالي</span>
                </button>
                <div class="bg-emerald-950/50 border border-emerald-900/50 rounded-xl px-4 flex items-center justify-center gap-1">
                    <span class="text-[10px] text-emerald-400/60 font-medium">مجموع اليوم:</span>
                    <span id="total-today" class="text-xs font-black text-goldAccent font-sans">0</span>
                </div>
            </div>

            <!-- زر التسبيح والضغط الرئيسي الفخم المعتمد على تصميمك -->
            <button onclick="handleTap()" class="w-full bg-gradient-to-r from-amber-500 to-amber-400 text-darkGreen font-black py-4 px-6 rounded-2xl shadow-xl transition-all flex justify-between items-center text-base tap-active">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-fingerprint text-xl opacity-80 animate-pulse"></i>
                    <span id="active-dhikr-btn-text">سبّح الآن</span>
                </div>
                <!-- دائرة إحصاء النقرات داخل الزر -->
                <div class="bg-darkGreen/20 text-darkGreen font-sans font-black text-lg px-3 py-0.5 rounded-xl min-w-[40px] text-center" id="counter-badge">
                    0
                </div>
            </button>
        </div>

    </div>

    <!-- AUDIO FOR CLICK SOUND -->
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

    <script>
        // 1. مصفوفة الأدعية المتغيرة عشوائياً
        const randomDuas = [
            "اللَّهُمَّ إنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ، وَالْبُخْلِ وَالْجُبْنِ.",
            "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ.",
            "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ، وَشُكْرِكَ، وَحُسْنِ عِبَادَتِكَ.",
            "يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ.",
            "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي.",
            "رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ.",
            "اللَّهُمَّ إنِّي أَسْأَلُكَ الهُدَى وَالتُّقَى وَالعَفَافَ وَالغِنَى."
        ];

        // 2. قائمة الأذكار الأساسية للسبحة
        const dhikrList = [
            { id: 'subhan', text: 'سُبْحَانَ اللَّهِ' },
            { id: 'alhamd', text: 'الْحَمْدُ لِلَّهِ' },
            { id: 'allahu', text: 'اللَّهُ أَكْبَرُ' },
            { id: 'istighfar', text: 'أَسْتَغْفِرُ اللَّهَ' }
        ];

        // 3. مواقيت الصلاة الاسترشادية (تتغير تلقائياً بحسب الوقت)
        const prayerTimes = [
            { name: 'صلاة الفجر', time: '04:05', icon: 'fa-cloud-moon' },
            { name: 'شروق الشمس', time: '05:30', icon: 'fa-sun' },
            { name: 'صلاة الظهر', time: '12:22', icon: 'fa-cloud-sun' },
            { name: 'صلاة العصر', time: '15:45', icon: 'fa-cloud-sun' },
            { name: 'صلاة المغرب', time: '19:12', icon: 'fa-cloud-sunset' },
            { name: 'صلاة العشاء', time: '20:40', icon: 'fa-moon' }
        ];

        // الحالة الافتراضية للتطبيق (State)
        let activeDhikrId = 'subhan';
        let stats = JSON.parse(localStorage.getItem('v3_stats')) || {
            todayTotal: 0,
            counts: { subhan: 0, alhamd: 0, allahu: 0, istighfar: 0 }
        };

        // تشغيل التطبيق عند التحميل
        document.addEventListener('DOMContentLoaded', () => {
            changeRandomDua();
            renderDhikrGrid();
            updateUI();
            initPrayerClock();
        });

        // تغيير الدعاء بشكل عشوائي
        function changeRandomDua() {
            const randomIndex = Math.floor(Math.random() * randomDuas.length);
            document.getElementById('random-dua-text').innerText = randomDuas[randomIndex];
        }

        // بناء بطاقات الأذكار
        function renderDhikrGrid() {
            const grid = document.getElementById('dhikr-grid');
            grid.innerHTML = dhikrList.map(item => {
                const isSelected = item.id === activeDhikrId;
                const activeClasses = isSelected ? 'border-amber-400 bg-emerald-900/40 text-white' : 'border-emerald-900/30 bg-emerald-950/20 text-slate-400';
                return `<div onclick="selectDhikr('${item.id}')" class="p-3 border rounded-xl cursor-pointer text-center transition-all ${activeClasses}">`
                     + `<p class="text-xs font-bold block">${item.text}</p>`
                     + `<span class="text-[10px] font-sans opacity-60 mt-1 block">${stats.counts[item.id] || 0}</span>`
                     + `</div>`;
            }).join('');
        }

        // اختيار الذكر الحالي
        function selectDhikr(id) {
            activeDhikrId = id;
            renderDhikrGrid();
            updateUI();
        }

        // تحديث أرقام ونصوص الواجهة
        function updateUI() {
            const currentDhikr = dhikrList.find(d => d.id === activeDhikrId);
            document.getElementById('active-dhikr-btn-text').innerText = currentDhikr.text;
            document.getElementById('counter-badge').innerText = stats.counts[activeDhikrId] || 0;
            document.getElementById('total-today').innerText = stats.todayTotal.toLocaleString();
            localStorage.setItem('v3_stats', JSON.stringify(stats));
        }
 
        // ميكانيكية النقر والتسبيح
        function handleTap() {
            stats.todayTotal++;
            stats.counts[activeDhikrId] = (stats.counts[activeDhikrId] || 0) + 1;
            
            // تشغيل صوت نقرة خفيف
            const snd = document.getElementById('click-sound');
            if (snd) { snd.currentTime = 0; snd.play().catch(()=>{}); }

            // اهتزاز الموبايل خفيف جداً إن أمكن
            if (navigator.vibrate) navigator.vibrate(15);

            // تدوير الدعاء كل 33 تسبيحة كمفاجأة للمستخدم وتنشيط روحي
            if (stats.counts[activeDhikrId] % 33 === 0) {
                changeRandomDua();
            }

            updateUI();
            renderDhikrGrid();
        }

        // تصفير العداد
        function resetCounter() {
            stats.counts[activeDhikrId] = 0;
            updateUI();
            renderDhikrGrid();
        }

        // محرك وقت الصلاة التلقائي
        function initPrayerClock() {
            const clockEl = document.getElementById('live-clock');
            
            const runEngine = () => {
                const now = new Date();
                clockEl.innerText = now.toTimeString().split(' ')[0];

                const hrs = now.getHours();
                const mns = now.getMinutes();
                const sec = now.getSeconds();

                let nextPrayer = prayerTimes[0];
                let minDiff = Infinity;

                prayerTimes.forEach(p => {
                    const [pHrs, pMns] = p.time.split(':').map(Number);
                    let diff = (pHrs * 60 + pMns) - (hrs * 60 + mns);
                    if (diff <= 0) diff += 24 * 60; // اليوم التالي
                    
                    if (diff < minDiff) {
                        minDiff = diff;
                        nextPrayer = p;
                    }
                });

                document.getElementById('prayer-name').innerText = nextPrayer.name;
                document.getElementById('prayer-time').innerText = nextPrayer.time;
                document.getElementById('prayer-icon').className = `fa-solid ${nextPrayer.icon} text-lg`;

                // حساب التوقيت التنازلي المتبقي بدقة
                const [pHrs, pMns] = nextPrayer.time.split(':').map(Number);
                let currentTotalSec = (hrs * 3600) + (mns * 60) + sec;
                let targetTotalSec = (pHrs * 3600) + (pMns * 60);
                if (targetTotalSec <= currentTotalSec) targetTotalSec += 24 * 3600;

                let diffSec = targetTotalSec - currentTotalSec;
                let rHrs = Math.floor(diffSec / 3600);
                let rMns = Math.floor((diffSec % 3600) / 60);
                let rSec = diffSec % 60;

                const pad = n => String(n).padStart(2, '0');
                document.getElementById('prayer-countdown').innerText = `متبقي ${pad(rHrs)}:${pad(rMns)}:${pad(rSec)}`;
            };

            runEngine();
            setInterval(runEngine, 1000);
        }
    </script>
</body>
</html>
